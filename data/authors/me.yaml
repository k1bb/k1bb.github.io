bio: |
  My research focuses on the physical interactions between the atmosphere and terrestrial vegetation using Earth System Models.

  In the past, I studied the impact of terrestrial vegetation on the representation of the El Niño-Southern Oscillation (ENSO) using the Earth System Model MIROC. Currently, my work focuses on refining the model representation of the atmosphere-land water cycle in the Amazon rainforest and identifying its hydrological tipping point. Specifically, I am advancing the implementation of "ATAMI," a state-of-the-art integrated photosynthesis-hydraulics module based on optimality theory, into the model.

  Furthermore, I am interested in peripheral technologies and software development related to weather and climate modeling. This includes generating boundary condition data for next-generation climate models using satellite observations (GEDI/ICESat-2), participating in the Radiative-Convective Equilibrium Model Intercomparison Project (RCEMIP-II), and developing the meteorological data analysis tool "xgtool3".

  Contact: khashimoto@eps.s.u-tokyo.ac.jp

