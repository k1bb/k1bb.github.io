bio: |
  地球システムモデリングを専門とし、気象学・植物生理学・計算機科学を統合した視座から、大気と陸上植生の物理的相互作用の解明に取り組んでいます。

  特に、日本の地球システムモデル「MIROC」の開発に深く携わり、最適性理論に基づく最新の光合成・水理学統合モジュール「ATAMI」の独自開発や、衛星観測データ（GEDI/ICESat-2）を活用した全球植生パラメータの精緻化などを主導してきました。現在は、アマゾン熱帯林の不可逆的なサバナ化（Amazon dieback）の臨界点特定や、エルニーニョ・南方振動（ENSO）等に対する陸上生態系の気候フィードバックの解明を目指しています。

  また、次期結合モデル相互比較計画（CMIP7）に向けた境界条件の構築や、放射対流平衡実験の国際相互比較プロジェクト（RCEMIP-II）への参画に加え、気象データ解析ツール「xgtool3」のオープンソース開発など、ソフトウェアエンジニアリングを通じた研究基盤の高度化にも注力しています。

  共同研究やご質問など、お気軽にご連絡ください 😃

