bio: |
  地球システムモデルを用いた、大気と陸上植生の物理的相互作用に関する研究を行っています。

  過去には、地球システムモデル「MIROC」を用いて、陸上植生がエルニーニョ・南方振動（ENSO）の再現性に与える影響について研究を行いました。現在は、アマゾン熱帯林における大気-陸面間の水循環のモデル表現の精緻化と、それを用いたアマゾンの水文学的臨界点（tipping point）の特定に取り組んでいます。具体的には、最適性理論に基づく最新の光合成・水理学統合モジュール「ATAMI」のモデルへの実装などを進めています。

  また、衛星観測データ（GEDI/ICESat-2）を用いた次期気候モデル向けの境界条件データの作成や、放射対流平衡実験の国際比較プロジェクト（RCEMIP-II）への参加に加え、気象データ解析ツール「xgtool3」の開発など、気象・気候モデリングに関わる周辺技術やソフトウェア開発にも興味を持っています。

  共同研究やご質問など、お気軽にご連絡ください 😃

